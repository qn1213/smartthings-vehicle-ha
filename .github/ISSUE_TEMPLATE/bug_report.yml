name: 버그 제보
body:
  - type: markdown
    attributes:
      value: |
        제보 감사합니다. 공개 이슈에는 토큰, 쿠키, 실제 SmartThings deviceId, 차량 번호, VIN, 위치, 개인 서버 URL을 올리지 마세요.
  - type: textarea
    id: problem
    attributes:
      label: 문제 설명
      description: 어떤 문제가 발생했나요?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: 민감 정보를 제거한 단계만 적어 주세요.
    validations:
      required: true
  - type: input
    id: ha-version
    attributes:
      label: Home Assistant 버전
      placeholder: 2025.x.x
  - type: input
    id: integration-version
    attributes:
      label: 스마트싱스 차량 통합 버전
      placeholder: 0.1.0
  - type: textarea
    id: logs
    attributes:
      label: 관련 로그
      description: 토큰, deviceId, URL, 위치 정보를 반드시 마스킹하세요.
      render: text
